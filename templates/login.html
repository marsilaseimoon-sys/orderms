<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderPro — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #6c63ff;
    --primary-dark: #5a52e0;
    --accent: #00e5a0;
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
  }
  * { font-family: 'Plus Jakarta Sans', sans-serif; }
  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
    top: -200px; left: -200px;
    animation: float1 8s ease-in-out infinite;
  }
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,229,160,0.1) 0%, transparent 70%);
    bottom: -150px; right: -150px;
    animation: float2 10s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-60px)} }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(48,54,61,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(48,54,61,0.4) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 460px; padding: 20px; }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.5s ease;
  }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .brand-logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(108,99,255,0.4);
  }
  .brand-title { font-size: 28px; font-weight: 800; color: var(--text); text-align: center; }
  .brand-title span { color: var(--primary); }
  .brand-sub { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 36px; }

  .form-label { color: var(--muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .form-control {
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: 12px !important;
    padding: 12px 16px !important;
    font-size: 15px;
    transition: all 0.2s;
  }
  .form-control:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px rgba(108,99,255,0.2) !important; }
  .form-control::placeholder { color: var(--muted) !important; }
  .input-group-text {
    background: rgba(255,255,255,0.05) !important;
    border: 1px solid var(--border) !important;
    color: var(--muted) !important;
    border-radius: 12px 0 0 12px !important;
    border-right: none !important;
  }
  .input-group .form-control { border-radius: 0 12px 12px 0 !important; border-left: none !important; }

  .btn-login {
    background: linear-gradient(135deg, var(--primary), #9c8ffc);
    border: none; border-radius: 12px;
    color: white; font-weight: 700; font-size: 15px;
    padding: 13px; width: 100%;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108,99,255,0.5); color: white; }

  .divider { border-color: var(--border); opacity: 1; margin: 28px 0; }

  .demo-creds {
    background: rgba(108,99,255,0.08);
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 12px; padding: 14px 18px;
  }
  .demo-creds p { color: var(--muted); font-size: 12px; margin: 0 0 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .cred-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .cred-label { color: var(--muted); font-size: 13px; }
  .cred-val { color: var(--accent); font-size: 13px; font-weight: 600; font-family: monospace; cursor: pointer; }
  .cred-val:hover { color: white; }

  .alert-danger { background: rgba(255,101,132,0.1); border: 1px solid rgba(255,101,132,0.3); color: #ff6584; border-radius: 12px; font-size: 14px; }

  .features {
    display: flex; gap: 16px; margin-top: 28px;
    justify-content: center; flex-wrap: wrap;
  }
  .feature-tag {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    color: var(--muted); font-size: 12px;
    display: flex; align-items: center; gap: 5px;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="brand-logo">📦</div>
    <div class="brand-title">Order<span>Pro</span></div>
    <div class="brand-sub">Business Management System</div>

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 mb-4" role="alert">
      <i class="bi bi-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Enter password" required>
          <button class="btn" type="button" onclick="togglePass()" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-left:none;border-radius:0 12px 12px 0;color:var(--muted)">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In to Dashboard
      </button>
    </form>

    <hr class="divider">

    <div class="demo-creds">
      <p>🔑 Demo Credentials</p>
      <div class="cred-item">
        <span class="cred-label">Admin:</span>
        <span class="cred-val" onclick="fillCreds('admin','admin123')">admin / admin123</span>
      </div>
      <div class="cred-item">
        <span class="cred-label">Manager:</span>
        <span class="cred-val" onclick="fillCreds('manager','manager123')">manager / manager123</span>
      </div>
    </div>

    <div class="features">
      <span class="feature-tag"><i class="bi bi-graph-up text-success"></i> AI Reports</span>
      <span class="feature-tag"><i class="bi bi-whatsapp text-success"></i> WhatsApp</span>
      <span class="feature-tag"><i class="bi bi-file-earmark-excel text-success"></i> Excel Sync</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass() {
  const inp = document.getElementById('passwordInput');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; ico.className = 'bi bi-eye-slash'; }
  else { inp.type = 'password'; ico.className = 'bi bi-eye'; }
}
function fillCreds(u, p) {
  document.querySelector('[name=username]').value = u;
  document.querySelector('[name=password]').value = p;
}
</script>
</body>
</html>
